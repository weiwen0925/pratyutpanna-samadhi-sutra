<style>
:root{
  --bg:#f7f3ec; --text:#2c2416; --text2:#5a4e3a; --text-muted:#6B5B4B;
  --accent:#8b5e3c; --accentL:#c4956a; --accent-red:#8B2500;
  --gold:#b8860b; --goldL:#d4a84b; --gold-light:#C9A84C;
  --border:#d4c4a8; --border-light:#EDE8E0; --card:#fffdf7;
  --verseBg:#f0e8d8; --verseBd:#c4956a;
  --sbW:76px; --sbBg:#1e1a14; --sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
}
*{box-sizing:border-box;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;-webkit-user-drag:none;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  font-size:17px;line-height:1.85;}

a{color:inherit;text-decoration:none;}

/* ===== 隱形 top 錨點 ===== */
#top{position:absolute;top:0;left:0;width:1px;height:1px;overflow:hidden;}

/* ===== 側欄 ===== */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;width:0;}

.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);writing-mode:horizontal-tb;text-orientation:mixed;
  text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}

.sb-nav{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;padding:6px 0;}
.sb-item{display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:60px;padding:3px 4px;border-radius:8px;cursor:pointer;
  color:var(--sbText);text-decoration:none;transition:all .25s;}
.sb-item:hover{background:rgba(184,134,11,.12);color:#fff;}
.sb-circle{width:34px;height:34px;border-radius:50%;
  border:1.4px solid var(--gold);display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-size:13px;font-weight:600;color:var(--gold);
  background:rgba(184,134,11,.05);transition:all .25s;}
.sb-label{font-family:"Noto Sans TC",sans-serif;font-size:10px;
  letter-spacing:1px;margin-top:5px;opacity:.85;text-align:center;}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;
  box-shadow:0 0 14px rgba(184,134,11,.55);}
.sb-item.active .sb-label{color:#fff;opacity:1;}

/* ===== 漢堡 ===== */
#sbToggle{position:fixed;top:14px;left:14px;z-index:150;
  width:42px;height:42px;border-radius:50%;
  background:var(--sbBg);color:var(--gold);border:1px solid var(--gold);
  font-size:18px;cursor:pointer;display:none;}

/* ===== 主區 ===== */
.main{margin-left:var(--sbW);min-height:100vh;}

/* ===== Hero ===== */
.site-hero{position:relative;background:linear-gradient(135deg,#1e1a14 0%,#2a2218 45%,#1e1a14 100%);
  color:#f8f4ea;padding:90px 24px 70px;text-align:center;overflow:hidden;}
.site-hero::before{content:"般 舟";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:280px;font-weight:900;
  color:rgba(212,168,75,.04);letter-spacing:60px;
  pointer-events:none;white-space:nowrap;font-family:"Noto Serif TC",serif;}
.site-hero > *{position:relative;z-index:2;}
.hero-title{margin:0 0 14px;font-size:48px;font-weight:900;
  color:var(--goldL);letter-spacing:6px;line-height:1.25;}
.hero-subtitle{margin:0 0 10px;font-size:18px;letter-spacing:5px;
  color:#e8d8a8;opacity:.95;font-weight:300;}
.hero-sub{margin:6px auto 10px;font-size:15px;letter-spacing:2.5px;
  color:#d4c4a8;opacity:.85;max-width:760px;}
.hero-meta{margin:4px auto 0;font-size:14px;letter-spacing:3px;color:#bba078;opacity:.7;}
.hero-range{margin:18px auto 0;font-size:13px;letter-spacing:5px;color:#a78b58;opacity:.75;}

/* ===== Preface ===== */
.preface{max-width:880px;margin:48px auto 30px;padding:24px 34px;
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;box-shadow:0 2px 12px rgba(91,58,41,.06);}
.preface-title{text-align:center;color:var(--accent);font-size:26px;
  letter-spacing:6px;margin:0 0 18px;font-weight:700;}
.preface p{margin:0 0 14px;color:var(--text2);line-height:2;font-size:16.5px;}
.preface p:last-child{margin-bottom:0;}

/* ===== 總目錄 ===== */
.toc-section{max-width:1100px;margin:30px auto 40px;padding:0 24px;}
.toc-title{text-align:center;font-size:30px;letter-spacing:14px;
  color:var(--accent);margin:0 0 8px;font-weight:700;}
.toc-desc{text-align:center;font-size:14px;letter-spacing:3px;
  color:var(--text-muted);margin:0 0 26px;opacity:.85;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;}
.toc-card{display:flex;align-items:center;gap:14px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px 18px;cursor:pointer;transition:all .25s;}
.toc-card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(91,58,41,.12);
  border-color:var(--gold);}
.toc-num{flex-shrink:0;width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-size:16px;font-weight:700;}
.toc-name{font-size:16px;line-height:1.6;color:var(--text);}
.toc-name small{display:block;font-size:13px;color:var(--text-muted);
  margin-top:3px;opacity:.85;font-weight:400;}

/* ===== 章節 ===== */
.chapter{margin:34px 0 0;padding:0;}
.ch-head{background:var(--headGrad);color:#f8f4ea;
  padding:36px 24px 30px;text-align:center;border-bottom:2px solid var(--gold);}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:14px;
  letter-spacing:5px;color:var(--goldL);opacity:.9;margin-bottom:8px;}
.ch-name{margin:0 0 6px;font-size:30px;letter-spacing:8px;
  color:#fff;font-weight:700;}
.ch-sub{font-size:14px;letter-spacing:3px;color:#d4c4a8;opacity:.85;}
.ch-body{max-width:980px;margin:0 auto;padding:30px 22px 40px;
  background:var(--bg);}

/* ===== 橋接 ===== */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;
  font-size:11px;background:var(--gold);color:#fff;
  padding:3px 12px;border-radius:12px;letter-spacing:2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;}

/* ===== iframe ===== */
.ch-frame{display:block;width:100%;border:0;
  background:#fffdf7;border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}

/* ===== 下一品連結 ===== */
.next-link{display:block;margin:24px auto 0;text-align:center;
  font-family:"Noto Sans TC",sans-serif;font-size:15px;letter-spacing:3px;
  color:var(--accent);padding:10px 22px;border:1.5px solid var(--gold);
  border-radius:30px;max-width:280px;transition:all .25s;cursor:pointer;}
.next-link:hover{background:var(--gold);color:#fff;}

/* ===== 底部進度膠囊 ===== */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* ===== 回頂按鈕 ===== */
#backTop{position:fixed;right:22px;bottom:22px;width:44px;height:44px;
  border-radius:50%;background:var(--sbBg);color:var(--gold);
  border:1px solid var(--gold);font-size:18px;cursor:pointer;display:none;
  z-index:115;box-shadow:0 3px 10px rgba(0,0,0,.18);}
#backTop.show{display:block;}

/* ===== Footer ===== */
.site-footer{background:#1e1a14;color:#d4c4a8;text-align:center;
  padding:34px 22px 50px;margin-top:50px;font-size:13.5px;letter-spacing:2px;}
.site-footer p{margin:0 0 6px;}

/* ===== RWD ===== */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .25s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .toc-grid{grid-template-columns:1fr;}
  .hero-title{font-size:36px;letter-spacing:4px;}
  .ch-name{font-size:24px;letter-spacing:4px;}
}

.read-progress .rp-label{font-size:12px!important;}
.sb-circle{font-size:15px!important;}
.sb-label{font-size:11.5px!important;}
.site-footer,.site-footer p{font-size:15px!important;}

<script>
// sticky brand 平滑回頂
(function(){
  var sbBrand=document.getElementById('sbBrand');
  if(sbBrand){
    sbBrand.addEventListener('click',function(e){
      e.preventDefault();
      window.scrollTo({top:0,behavior:'smooth'});
    });
  }
})();

// 進度條
var rpFill=document.getElementById('rpFill');
var rpPct=document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill) rpFill.style.width=pct+'%';
  if(rpPct)  rpPct.textContent=Math.round(pct)+'%';
}
window.addEventListener('scroll',updateProgress,{passive:true});
updateProgress();

// iframe 自動高度（無 buffer / body.scrollHeight only）
function resizeFrame(f){
  try{
    var d=f.contentDocument||f.contentWindow.document;
    if(!d||!d.body) return;
    d.body.style.minHeight='0';
    d.body.style.height='auto';
    if(d.documentElement){
      d.documentElement.style.minHeight='0';
      d.documentElement.style.height='auto';
    }
    var h=d.body.scrollHeight;
    if(h>100){
      f.style.height=h+'px';
      f.style.minHeight='0';
    }
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function') updateProgress();
}
function setupFrame(f){
  var tries=0;
  function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
  if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}
  else{f.addEventListener('load',tick);}
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});

// 錨點點擊防錯跳
document.addEventListener('click',function(e){
  var a=e.target;
  while(a&&a.tagName!=='A') a=a.parentElement;
  if(!a) return;
  var h=a.getAttribute('href');
  if(!h||h.charAt(0)!=='#'||h.length<2) return;
  var id=h.substring(1);
  var el=document.getElementById(id);
  if(!el) return;
  e.preventDefault();
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect=el.getBoundingClientRect();
    var y=window.scrollY+rect.top-20;
    window.scrollTo({top:y,behavior:'smooth'});
  },60);
},true);

// 持續輪詢 15s
var _rt=0,_riv=setInterval(function(){
  _rt++;resizeAllFrames();
  if(_rt>50) clearInterval(_riv);
},300);

// 接近頁尾淡出進度膠囊
(function(){
  var cap=document.getElementById('readProgress');
  if(!cap) return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var targets=[];
  var f=document.querySelector('.site-footer');
  if(f) targets.push(f);
  if(!targets.length) return;
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){
      var any=entries.some(function(e){return e.isIntersecting;});
      setHide(any);
    },{root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
    targets.forEach(function(t){io.observe(t);});
  }else{
    var check=function(){
      var dh=document.documentElement.scrollHeight;
      var sb=window.scrollY+window.innerHeight;
      setHide(dh-sb<240);
    };
    window.addEventListener('scroll',check,{passive:true});
    check();
  }
})();

// 側欄高亮
function updateActiveSb(){
  var chs=document.querySelectorAll('.chapter');
  var winH=window.innerHeight;
  var activeN=null;
  chs.forEach(function(c){
    var rect=c.getBoundingClientRect();
    if(rect.top<winH*0.35){
      var idAttr=c.id||''; var m=idAttr.match(/chapter-(\d+)/);
      if(m) activeN=m[1];
    }
  });
  document.querySelectorAll('.sb-item').forEach(function(it){
    if(it.getAttribute('data-ch')===activeN) it.classList.add('active');
    else it.classList.remove('active');
  });
}
window.addEventListener('scroll',updateActiveSb,{passive:true});
updateActiveSb();

// 漢堡開合
var sbT=document.getElementById('sbToggle');
var sb=document.getElementById('sb');
if(sbT&&sb){
  sbT.addEventListener('click',function(){sb.classList.toggle('open');});
}

// 回頂按鈕
var btnTop=document.getElementById('backTop');
window.addEventListener('scroll',function(){
  if(window.scrollY>600) btnTop.classList.add('show');
  else btnTop.classList.remove('show');
},{passive:true});
if(btnTop){
  btnTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
}

// 防複製外層
(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);
})();
</script>
</main>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-pratyutpanna-samadhi-";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
